[extractor]
mode = "upc"
qty_search_window = 10

[upc]
match_patterns = [
  "(?<!\\d)(?:\\d[\\s-]*){12}(?!\\d)",
]
reject_patterns = [
  "\\b(?:phone|member|membership|order|transaction|auth|approval)\\b",
]
normalize_digits_only = true
allowed_lengths = [12]

[filters]
non_item_patterns = [
  "\\bsubtotal\\b",
  "\\btotal\\b",
  "\\bamount\\b",
  "\\btax\\b",
  "\\bfees?\\b",
  "\\bpayment\\b",
  "\\bbalance\\s+due\\b",
  "\\bchange\\b",
  "\\bcash\\b",
  "\\bdebit\\b",
  "\\bcredit\\b",
  "\\bvisa\\b",
  "\\bmastercard\\b",
  "\\bamex\\b",
  "\\bprice\\b",
  "\\bqty\\b",
  "\\bquantity\\b",
  "\\bdiscount\\b",
  "\\bsavings?\\b",
  "\\bthank you\\b",
  "\\breceipt\\b",
  "\\binvoice\\b",
  "\\border\\b",
  "\\bmember(ship)?\\b",
  "\\btransaction\\b",
  "\\bapproval\\b",
  "\\bauthorization\\b",
  "\\bchange due\\b",
  "\\bbj'?s\\b",
  "\\b(?:mon|tue|wed|thu|fri|sat|sun),\\s",
  "\\b(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday)\\b",
]

fragment_vocab = []

[thresholds]
dedupe_y_tol = 18.0
merge_y_gap_abs = 28.0
merge_y_gap_mult = 1.4
merge_x_tol = 28.0
continuation_word_conf_min = 20.0
short_noise_conf_max = 78.0
mixed_gibberish_conf_max = 80.0
